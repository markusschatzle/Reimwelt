# nginx site for Reimwelt. Routes /api → FastAPI (:8000) and everything else →
# Next.js (:3000). Install:
#   sudo cp deploy/nginx-reimwelt.conf /etc/nginx/sites-available/reimwelt
#   sudo ln -s /etc/nginx/sites-available/reimwelt /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# Then add TLS with: sudo certbot --nginx -d reimwelt.de -d www.reimwelt.de
# (certbot rewrites this file to add the 443 server block + redirect.)

server {
    listen 80;
    listen [::]:80;
    server_name reimwelt.de www.reimwelt.de;

    # Reasonable upload/body limits + gzip
    client_max_body_size 1m;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # FastAPI backend — client calls relative /api/*; server components use
    # INTERNAL_API_URL directly and never hit nginx.
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js immutable build assets — let nginx cache them hard.
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Everything else → Next.js (pages, ISR, sitemap, robots, public/).
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
