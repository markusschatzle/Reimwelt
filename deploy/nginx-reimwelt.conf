# nginx site for Reimwelt. Routes /api → FastAPI (:8000) and everything else →
# Next.js (:3000), redirects www → apex, rate-limits the API, and sets a few
# security headers. Install:
#   sudo cp deploy/nginx-reimwelt.conf /etc/nginx/sites-available/reimwelt
#   sudo ln -s /etc/nginx/sites-available/reimwelt /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# Then add TLS with: sudo certbot --nginx -d reimwelt.de -d www.reimwelt.de
# (certbot adds the 443 listeners + the 80→443 redirect; the www redirect and
# headers below are preserved.)

# Rate-limit zone for the API (valid at http context — this file is included
# inside http {}). ~10 req/s per IP with a small burst.
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

# Canonical host is the apex (matches NEXT_PUBLIC_SITE_URL). Redirect www → apex
# so search engines don't see duplicate content.
server {
    listen 80;
    listen [::]:80;
    server_name www.reimwelt.de;
    return 301 https://reimwelt.de$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name reimwelt.de;

    client_max_body_size 1m;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Security headers. (CSP is intentionally omitted — Next.js ships inline
    # runtime/theme scripts; a strict CSP needs nonces and is a follow-up.)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # FastAPI backend — client calls relative /api/*; server components use
    # INTERNAL_API_URL directly and never hit nginx.
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js immutable build assets — let nginx cache them hard.
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
        # (location-level add_header drops server-level ones; assets don't need them.)
    }

    # Everything else → Next.js (pages, ISR, sitemap, robots, public/).
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
